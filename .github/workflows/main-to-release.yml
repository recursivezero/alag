name: Sync Main to Release

on:
  push:
    branches: [main]

jobs:
  sync:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch branches
        run: |
          git fetch origin main
          git fetch origin release

      - name: Check for Code Differences
        id: diff_check
        run: |
          DIFF=$(git diff origin/release...origin/main --name-only)

          if [ -z "$DIFF" ]; then
            echo "No changes found between main and release. Skipping."
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Authenticate GH
        if: steps.diff_check.outputs.has_changes == 'true'
        run: echo "${{ secrets.TZ_PROJECT_PAT }}" | gh auth login --with-token

      - name: Run PR Logic
        if: steps.diff_check.outputs.has_changes == 'true'
        uses: recursivezero/action-club/.github/actions/release-pr@v0.2.58
        env:
          GH_TOKEN: ${{ secrets.TZ_PROJECT_PAT }}
          GITHUB_TOKEN: ${{ secrets.TZ_PROJECT_PAT }}
